<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

  try{

    const res = await fetch("/api/reviews");
    const json = await res.json();

    const container = document.getElementById("reviews");

    if(!json.message){
      container.innerHTML = "No reviews available.";
      return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(json.message, "text/html");

    const reviews = doc.querySelectorAll(".module.search_result");

    if(!reviews.length){
      container.innerHTML = "No reviews available.";
      return;
    }

    container.innerHTML = "";

    const companies = {};
    let count = 0;

    reviews.forEach(r => {

      if(count >= 8) return;

      const company =
        r.querySelector(".notranslate")?.innerText ||
        r.querySelector("h3")?.innerText ||
        "Company";

      if(companies[company]) return;

      companies[company] = true;

      let text =
        r.querySelector(".review-description")?.innerText ||
        r.querySelector("p")?.innerText ||
        "";

      if(text.length > 140){
        text = text.substring(0,137) + "...";
      }

      /* COMPANY PAGE LINK */

      let link =
        r.querySelector("a[href*='/members/']")?.href ||
        "https://www.biohackingcompanies.com" +
        (r.querySelector("a")?.getAttribute("href") || "");
      const card = document.createElement("a");

      card.className = "review-card";
      card.href = link;
      card.target = "_blank";

      card.innerHTML = `
        <div class="review-company">${company}</div>
        <div class="review-stars">★★★★★</div>
        <div class="review-text">${text}</div>
        <div class="review-footer">
          <span>Verified Review</span>
          <span>Read More →</span>
        </div>
      `;

      container.appendChild(card);

      count++;

    });

  }catch(err){

    document.getElementById("reviews").innerHTML =
      "Unable to load reviews.";

    console.error(err);

  }

}

loadReviews();

</script>

</body>
</html>
