<!DOCTYPE html>
<html>
<head>
<title>Newest Reviews</title>
<link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<h1 style="display:none">Newest Reviews</h1>

<div class="reviews-header">

  <div class="reviews-title-wrap">
    <div class="reviews-overline">
      Biohacking & Wellness
    </div>

    <h2 class="reviews-title">
      Newest <em>Reviews</em>
    </h2>
  </div>

  <a class="reviews-view-all"
     href="https://www.biohackingcompanies.com/reviews"
     target="_blank">

     View All →
  </a>

</div>

<div id="reviews"></div>

<script>

async function loadReviews(){

  const res = await fetch("/api/reviews");
  const data = await res.json();

  const container = document.getElementById("reviews");

  if(!data.message){
    container.innerHTML = "No reviews available.";
    return;
  }

  const parser = new DOMParser();
  const doc = parser.parseFromString(data.message,"text/html");

  const reviews = doc.querySelectorAll(".review");

  const companies = {};
  const results = [];

  reviews.forEach(r => {

    const company = r.querySelector(".notranslate")?.innerText;

    if(!company) return;

    if(!companies[company]){
      companies[company] = true;
      results.push(r);
    }

  });

  container.innerHTML = "";

  results.slice(0,8).forEach(r => {

    const company = r.querySelector(".notranslate")?.innerText || "";
    const text = r.querySelector(".review-description")?.innerText || "";
    const link = r.querySelector("a")?.href || "#";

    const card = document.createElement("a");
    card.className="review-card";
    card.href=link;
    card.target="_blank";

    card.innerHTML=`
      <div class="review-company">${company}</div>

      <div class="review-stars">★★★★★</div>

      <div class="review-text">${text}</div>

      <div class="review-footer">
        <span>Verified Review</span>
        <span>Read More →</span>
      </div>
    `;

    container.appendChild(card);

  });

}

loadReviews();

</script>

</body>
</html>
