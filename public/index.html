<!DOCTYPE html>
<html>
<head>
<title>Newest Reviews</title>
</head>
<body>

<h1>Newest Reviews</h1>
<div id="reviews"></div>

<script>

async function loadReviews(){

  const res = await fetch("/api/reviews");
  const json = await res.json();

  const container = document.getElementById("reviews");

  if(!json.message){
    container.innerHTML = "No reviews available.";
    return;
  }

  /* Convert HTML string into DOM */

  const parser = new DOMParser();
  const doc = parser.parseFromString(json.message, "text/html");

  const reviews = doc.querySelectorAll(".module.search_result");

  if(!reviews.length){
    container.innerHTML = "No reviews available.";
    return;
  }

  container.innerHTML = "";

  const companies = {};

  reviews.forEach(r => {

    const company =
      r.querySelector(".notranslate")?.innerText ||
      r.querySelector("h3")?.innerText ||
      "Company";

    if(companies[company]) return;
    companies[company] = true;

    const text =
      r.querySelector(".review-description")?.innerText ||
      r.querySelector("p")?.innerText ||
      "";

    const link =
      r.querySelector("a")?.href ||
      "https://www.biohackingcompanies.com/reviews";

    const card = document.createElement("a");

    card.className = "review-card";
    card.href = link;
    card.target = "_blank";

    card.innerHTML = `
      <div class="review-company">${company}</div>
      <div class="review-stars">★★★★★</div>
      <div class="review-text">${text}</div>
      <div class="review-footer">
        <span>Verified Review</span>
        <span>Read More →</span>
      </div>
    `;

    container.appendChild(card);

  });

}

loadReviews();

</script>


</body>
</html>
